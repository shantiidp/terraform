name: "Phase 1: Foundation & Governance"

on:
  push:
    branches: [main]
    paths:
      - "infra/modules/**"
      - "infra/phases/01-foundation/**"
      - "governance/**"
  pull_request:
    paths:
      - "infra/modules/**"
      - "infra/phases/01-foundation/**"
      - "governance/**"

jobs:
  plan:
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      phase_dir: "01-foundation"
      environment: "dev"
      action: "plan"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  apply:
    if: github.ref == 'refs/heads/main'
    needs: plan
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      phase_dir: "01-foundation"
      environment: "dev"
      action: "apply"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
